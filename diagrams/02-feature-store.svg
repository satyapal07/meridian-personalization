<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Helvetica, sans-serif">
  <rect width="900" height="600" fill="#ffffff" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">Feature Store Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#6b7280">Same transformation logic for training and serving — prevents training-serving skew</text>

  <!-- Feature groups label -->
  <text x="30" y="80" font-size="10" font-weight="600" letter-spacing="1" fill="#6b7280">FEATURE GROUPS</text>

  <!-- Customer -->
  <rect x="30" y="88" width="156" height="104" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="108" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Customer</text>
  <text x="108" y="128" text-anchor="middle" font-size="10" fill="#166534">LTV tier, membership status</text>
  <text x="108" y="144" text-anchor="middle" font-size="10" fill="#166534">CTR per offer type</text>
  <text x="108" y="160" text-anchor="middle" font-size="10" fill="#166534">Days since impression</text>
  <text x="108" y="176" text-anchor="middle" font-size="10" fill="#166534">Payment method on file</text>

  <!-- Session -->
  <rect x="202" y="88" width="156" height="104" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="280" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Session</text>
  <text x="280" y="128" text-anchor="middle" font-size="10" fill="#166534">Page type</text>
  <text x="280" y="144" text-anchor="middle" font-size="10" fill="#166534">Cart value, items</text>
  <text x="280" y="160" text-anchor="middle" font-size="10" fill="#166534">Session length</text>
  <text x="280" y="176" text-anchor="middle" font-size="10" fill="#166534">Device type</text>

  <!-- Offer -->
  <rect x="374" y="88" width="156" height="104" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="452" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Offer</text>
  <text x="452" y="128" text-anchor="middle" font-size="10" fill="#6d28d9">Offer type, LTV value</text>
  <text x="452" y="144" text-anchor="middle" font-size="10" fill="#6d28d9">Eligibility flag</text>
  <text x="452" y="160" text-anchor="middle" font-size="10" fill="#6d28d9">Days since shown</text>
  <text x="452" y="176" text-anchor="middle" font-size="10" fill="#6d28d9">Marketer priority</text>

  <!-- Context -->
  <rect x="546" y="88" width="156" height="104" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="624" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Context</text>
  <text x="624" y="128" text-anchor="middle" font-size="10" fill="#6d28d9">Marketplace</text>
  <text x="624" y="144" text-anchor="middle" font-size="10" fill="#6d28d9">Time of day</text>
  <text x="624" y="160" text-anchor="middle" font-size="10" fill="#6d28d9">Day of week</text>
  <text x="624" y="176" text-anchor="middle" font-size="10" fill="#6d28d9">Funnel stage</text>

  <!-- Content -->
  <rect x="718" y="88" width="156" height="104" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="796" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Content</text>
  <text x="796" y="128" text-anchor="middle" font-size="10" fill="#78350f">Creative format</text>
  <text x="796" y="144" text-anchor="middle" font-size="10" fill="#78350f">Copy type</text>
  <text x="796" y="160" text-anchor="middle" font-size="10" fill="#78350f">Real estate size</text>
  <text x="796" y="176" text-anchor="middle" font-size="10" fill="#78350f">Campaign recency</text>

  <!-- Arrows to transform layer -->
  <line x1="108" y1="192" x2="310" y2="234" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="280" y1="192" x2="360" y2="234" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="452" y1="192" x2="450" y2="234" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="624" y1="192" x2="540" y2="234" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="796" y1="192" x2="590" y2="234" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Transform layer -->
  <rect x="30" y="240" width="840" height="56" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="450" y="263" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Feature Transformation Layer — single definition, identical logic for batch and streaming</text>
  <text x="450" y="282" text-anchor="middle" font-size="10" fill="#6b7280">Spark (nightly batch) + Kinesis Data Analytics (streaming) run the same transformation code</text>

  <!-- Fork arrows -->
  <line x1="250" y1="296" x2="200" y2="336" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="650" y1="296" x2="700" y2="336" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Offline store -->
  <rect x="30" y="338" width="400" height="118" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="46" y="358" font-size="10" font-weight="600" letter-spacing="1" fill="#1d4ed8">OFFLINE STORE (S3 / PARQUET)</text>
  <rect x="48" y="366" width="364" height="38" rx="5" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="230" y="382" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Historical snapshots</text>
  <text x="230" y="397" text-anchor="middle" font-size="10" fill="#3730a3">Point-in-time correct joins — no future data leakage</text>
  <rect x="48" y="412" width="364" height="30" rx="5" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="230" y="431" text-anchor="middle" font-size="10" fill="#1e40af">Feature versioning — models pinned to feature versions</text>

  <!-- Online store -->
  <rect x="470" y="338" width="400" height="118" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="486" y="358" font-size="10" font-weight="600" letter-spacing="1" fill="#92400e">ONLINE STORE (DYNAMODB / REDIS)</text>
  <rect x="488" y="366" width="364" height="38" rx="5" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
  <text x="670" y="382" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Current values only</text>
  <text x="670" y="397" text-anchor="middle" font-size="10" fill="#78350f">Sub-10ms lookup — composite key: customer × surface × marketplace</text>
  <rect x="488" y="412" width="364" height="30" rx="5" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
  <text x="670" y="431" text-anchor="middle" font-size="10" fill="#92400e">Seconds-fresh via Kinesis streaming pipeline</text>

  <!-- Arrows to consumers -->
  <line x1="230" y1="456" x2="230" y2="492" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="670" y1="456" x2="670" y2="492" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Consumers -->
  <rect x="30" y="494" width="400" height="76" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="230" y="518" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">SageMaker Training Jobs</text>
  <text x="230" y="537" text-anchor="middle" font-size="10" fill="#3730a3">180 models trained daily</text>
  <text x="230" y="554" text-anchor="middle" font-size="10" fill="#3730a3">Offline store → training dataset → model weights</text>

  <rect x="470" y="494" width="400" height="76" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="670" y="518" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Ranking Inference Endpoint</text>
  <text x="670" y="537" text-anchor="middle" font-size="10" fill="#78350f">Online store → feature vector → model score</text>
  <text x="670" y="554" text-anchor="middle" font-size="10" fill="#78350f">Per request, under 50ms total path</text>
</svg>
