<svg width="900" height="510" viewBox="0 0 900 510" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Helvetica, sans-serif">
  <rect width="900" height="510" fill="#ffffff" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">Why 180 Models — and the Cold Start Evolution</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#6b7280">One model is wrong. Intent changes by page. Behavior changes by marketplace.</text>

  <!-- Grid label -->
  <text x="30" y="80" font-size="10" font-weight="600" letter-spacing="1" fill="#6b7280">180 MODELS = 6 MARKETPLACES × 4 PAGE SURFACES × VARIANTS</text>

  <!-- Column headers -->
  <text x="207" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">PDP</text>
  <text x="330" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Cart</text>
  <text x="458" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Checkout</text>
  <text x="586" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Post-purchase</text>

  <!-- US row -->
  <text x="90" y="124" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">US</text>
  <rect x="148" y="110" width="118" height="28" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="207" y="128" text-anchor="middle" font-size="10" fill="#6b7280">us-pdp-v1</text>
  <rect x="271" y="110" width="118" height="28" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="330" y="128" text-anchor="middle" font-size="10" fill="#6b7280">us-cart-v1</text>
  <rect x="399" y="108" width="118" height="32" rx="5" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="458" y="128" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">us-checkout-v1 ★</text>
  <rect x="527" y="110" width="118" height="28" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="586" y="128" text-anchor="middle" font-size="10" fill="#6b7280">us-typ-v1</text>

  <!-- UK row -->
  <text x="90" y="158" text-anchor="middle" font-size="11" fill="#9ca3af">UK</text>
  <rect x="148" y="146" width="118" height="26" rx="5" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
  <text x="207" y="163" text-anchor="middle" font-size="10" fill="#9ca3af">uk-pdp-v1</text>
  <rect x="271" y="146" width="118" height="26" rx="5" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
  <text x="330" y="163" text-anchor="middle" font-size="10" fill="#9ca3af">uk-cart-v1</text>
  <rect x="399" y="146" width="118" height="26" rx="5" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
  <text x="458" y="163" text-anchor="middle" font-size="10" fill="#9ca3af">uk-checkout-v1</text>
  <rect x="527" y="146" width="118" height="26" rx="5" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
  <text x="586" y="163" text-anchor="middle" font-size="10" fill="#9ca3af">uk-typ-v1</text>

  <!-- DE row -->
  <text x="90" y="192" text-anchor="middle" font-size="11" fill="#9ca3af">DE</text>
  <rect x="148" y="180" width="118" height="26" rx="5" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
  <text x="207" y="197" text-anchor="middle" font-size="10" fill="#9ca3af">de-pdp-v1</text>
  <rect x="271" y="180" width="118" height="26" rx="5" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
  <text x="330" y="197" text-anchor="middle" font-size="10" fill="#9ca3af">de-cart-v1</text>
  <rect x="399" y="180" width="118" height="26" rx="5" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
  <text x="458" y="197" text-anchor="middle" font-size="10" fill="#9ca3af">de-checkout-v1</text>
  <rect x="527" y="180" width="118" height="26" rx="5" fill="#f9fafb" stroke="#f3f4f6" stroke-width="1"/>
  <text x="586" y="197" text-anchor="middle" font-size="10" fill="#9ca3af">de-typ-v1</text>

  <!-- More rows -->
  <text x="207" y="222" text-anchor="middle" font-size="13" fill="#d1d5db">···</text>
  <text x="330" y="222" text-anchor="middle" font-size="13" fill="#d1d5db">···</text>
  <text x="458" y="222" text-anchor="middle" font-size="13" fill="#d1d5db">···</text>
  <text x="586" y="222" text-anchor="middle" font-size="13" fill="#d1d5db">···</text>

  <!-- Star callout -->
  <rect x="660" y="107" width="210" height="56" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="765" y="126" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">★  Highest traffic + intent</text>
  <text x="765" y="143" text-anchor="middle" font-size="10" fill="#6d28d9">Most model training data</text>
  <text x="765" y="158" text-anchor="middle" font-size="10" fill="#6d28d9">Champion + challenger running</text>

  <!-- Divider -->
  <line x1="30" y1="240" x2="870" y2="240" stroke="#e5e7eb" stroke-width="1"/>
  <text x="30" y="260" font-size="10" font-weight="600" letter-spacing="1" fill="#6b7280">COLD START EVOLUTION — NEW OFFERS HAVE ZERO HISTORY</text>

  <!-- Phase 1 — neutral -->
  <rect x="30" y="272" width="256" height="218" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="158" y="296" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Phase 1 — Random Baseline</text>
  <rect x="48" y="306" width="62" height="18" rx="4" fill="#e5e7eb"/>
  <text x="79" y="319" text-anchor="middle" font-size="9" font-weight="600" fill="#6b7280">Before v1</text>
  <text x="158" y="352" text-anchor="middle" font-size="11" fill="#374151">10% of traffic</text>
  <text x="158" y="370" text-anchor="middle" font-size="11" fill="#374151">shown random offers</text>
  <text x="158" y="398" text-anchor="middle" font-size="10" fill="#6b7280">You can't train a model</text>
  <text x="158" y="414" text-anchor="middle" font-size="10" fill="#6b7280">without unbiased ground</text>
  <text x="158" y="430" text-anchor="middle" font-size="10" fill="#6b7280">truth. Selection bias</text>
  <text x="158" y="446" text-anchor="middle" font-size="10" fill="#6b7280">breaks evaluation.</text>
  <text x="158" y="474" text-anchor="middle" font-size="9" font-weight="600" fill="#9ca3af">Breaks selection bias</text>

  <!-- Phase 2 — blue -->
  <rect x="322" y="272" width="256" height="218" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="296" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Phase 2 — Epsilon-Greedy</text>
  <rect x="340" y="306" width="62" height="18" rx="4" fill="#2563eb"/>
  <text x="371" y="319" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Model live</text>
  <text x="450" y="352" text-anchor="middle" font-size="11" fill="#1d4ed8">95% exploit model</text>
  <text x="450" y="370" text-anchor="middle" font-size="11" fill="#1d4ed8">5% explore randomly</text>
  <text x="450" y="398" text-anchor="middle" font-size="10" fill="#3730a3">Cold start resolves over</text>
  <text x="450" y="414" text-anchor="middle" font-size="10" fill="#3730a3">weeks — blunt instrument,</text>
  <text x="450" y="430" text-anchor="middle" font-size="10" fill="#3730a3">equal exploration budget</text>
  <text x="450" y="446" text-anchor="middle" font-size="10" fill="#3730a3">everywhere.</text>
  <text x="450" y="474" text-anchor="middle" font-size="9" font-weight="600" fill="#6b7280">Simple to reason about</text>

  <!-- Phase 3 — green -->
  <rect x="614" y="272" width="256" height="218" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="742" y="296" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Phase 3 — Contextual Bandit</text>
  <rect x="632" y="306" width="62" height="18" rx="4" fill="#16a34a"/>
  <text x="663" y="319" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">RL policy</text>
  <text x="742" y="352" text-anchor="middle" font-size="11" fill="#15803d">Explore by uncertainty</text>
  <text x="742" y="370" text-anchor="middle" font-size="11" fill="#15803d">not by random chance</text>
  <text x="742" y="398" text-anchor="middle" font-size="10" fill="#166534">Cold start resolves in</text>
  <text x="742" y="414" text-anchor="middle" font-size="10" fill="#166534">days not weeks. Budget</text>
  <text x="742" y="430" text-anchor="middle" font-size="10" fill="#166534">concentrates where info</text>
  <text x="742" y="446" text-anchor="middle" font-size="10" fill="#166534">gain is highest.</text>
  <text x="742" y="474" text-anchor="middle" font-size="9" font-weight="600" fill="#6b7280">Faster cold start resolution</text>

  <!-- Phase arrows -->
  <line x1="288" y1="381" x2="320" y2="381" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="580" y1="381" x2="612" y2="381" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
