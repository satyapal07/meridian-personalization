<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', monospace">
  <rect width="900" height="520" fill="#ffffff" rx="12"/>

  <text x="450" y="36" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a2e">Why 180 Models — and the Cold Start Evolution</text>
  <text x="450" y="56" text-anchor="middle" font-size="11" fill="#666677">One model is wrong. Intent changes by page. Behavior changes by marketplace.</text>

  <!-- Model grid -->
  <text x="46" y="82" font-size="10" fill="#666677" font-weight="500" letter-spacing="1">180 MODELS = 6 MARKETPLACES × 4 PAGE SURFACES × VARIANTS</text>

  <!-- Page surface headers -->
  <text x="230" y="106" text-anchor="middle" font-size="10" fill="#555566" font-weight="500">PDP</text>
  <text x="350" y="106" text-anchor="middle" font-size="10" fill="#555566" font-weight="500">Cart</text>
  <text x="470" y="106" text-anchor="middle" font-size="10" fill="#555566" font-weight="500">Checkout</text>
  <text x="590" y="106" text-anchor="middle" font-size="10" fill="#555566" font-weight="500">Post-purchase</text>

  <!-- Marketplace rows -->
  <!-- US -->
  <text x="100" y="138" text-anchor="middle" font-size="10" fill="#555566">US</text>
  <rect x="170" y="120" width="116" height="28" rx="4" fill="#f0f0f8" stroke="#534AB7" stroke-width="1"/>
  <text x="228" y="138" text-anchor="middle" font-size="9" fill="#4a41b0">us-pdp-v1</text>
  <rect x="290" y="120" width="116" height="28" rx="4" fill="#f0f0f8" stroke="#534AB7" stroke-width="1"/>
  <text x="348" y="138" text-anchor="middle" font-size="9" fill="#4a41b0">us-cart-v1</text>
  <rect x="410" y="120" width="116" height="28" rx="4" fill="#f0f0f8" stroke="#4a40cc" stroke-width="1.5"/>
  <text x="468" y="138" text-anchor="middle" font-size="9" fill="#4a41b0" font-weight="600">us-checkout-v1 ★</text>
  <rect x="530" y="120" width="116" height="28" rx="4" fill="#f0f0f8" stroke="#534AB7" stroke-width="1"/>
  <text x="588" y="138" text-anchor="middle" font-size="9" fill="#4a41b0">us-typ-v1</text>

  <!-- UK -->
  <text x="100" y="168" text-anchor="middle" font-size="10" fill="#555566">UK</text>
  <rect x="170" y="150" width="116" height="28" rx="4" fill="#f0f0f8" stroke="#ccccdd" stroke-width="1"/>
  <text x="228" y="168" text-anchor="middle" font-size="9" fill="#888899">uk-pdp-v1</text>
  <rect x="290" y="150" width="116" height="28" rx="4" fill="#f0f0f8" stroke="#ccccdd" stroke-width="1"/>
  <text x="348" y="168" text-anchor="middle" font-size="9" fill="#888899">uk-cart-v1</text>
  <rect x="410" y="150" width="116" height="28" rx="4" fill="#f0f0f8" stroke="#ccccdd" stroke-width="1"/>
  <text x="468" y="168" text-anchor="middle" font-size="9" fill="#888899">uk-checkout-v1</text>
  <rect x="530" y="150" width="116" height="28" rx="4" fill="#f0f0f8" stroke="#ccccdd" stroke-width="1"/>
  <text x="588" y="168" text-anchor="middle" font-size="9" fill="#888899">uk-typ-v1</text>

  <!-- DE -->
  <text x="100" y="198" text-anchor="middle" font-size="10" fill="#555566">DE</text>
  <rect x="170" y="180" width="116" height="28" rx="4" fill="#f0f0f8" stroke="#ccccdd" stroke-width="1"/>
  <text x="228" y="198" text-anchor="middle" font-size="9" fill="#888899">de-pdp-v1</text>
  <rect x="290" y="180" width="116" height="28" rx="4" fill="#f0f0f8" stroke="#ccccdd" stroke-width="1"/>
  <text x="348" y="198" text-anchor="middle" font-size="9" fill="#888899">de-cart-v1</text>
  <rect x="410" y="180" width="116" height="28" rx="4" fill="#f0f0f8" stroke="#ccccdd" stroke-width="1"/>
  <text x="468" y="198" text-anchor="middle" font-size="9" fill="#888899">de-checkout-v1</text>
  <rect x="530" y="180" width="116" height="28" rx="4" fill="#f0f0f8" stroke="#ccccdd" stroke-width="1"/>
  <text x="588" y="198" text-anchor="middle" font-size="9" fill="#888899">de-typ-v1</text>

  <!-- More rows indicator -->
  <text x="228" y="228" text-anchor="middle" font-size="10" fill="#c0c0cc">· · ·</text>
  <text x="348" y="228" text-anchor="middle" font-size="10" fill="#c0c0cc">· · ·</text>
  <text x="468" y="228" text-anchor="middle" font-size="10" fill="#c0c0cc">· · ·</text>
  <text x="588" y="228" text-anchor="middle" font-size="10" fill="#c0c0cc">· · ·</text>
  <text x="100" y="228" text-anchor="middle" font-size="10" fill="#c0c0cc">· · ·</text>

  <!-- Note on US checkout -->
  <rect x="660" y="114" width="220" height="52" rx="6" fill="#f0f0f8" stroke="#534AB7" stroke-width="1"/>
  <text x="770" y="134" text-anchor="middle" font-size="10" fill="#4a41b0">★ Highest traffic + intent</text>
  <text x="770" y="150" text-anchor="middle" font-size="10" fill="#4a41b0">Most model training data</text>
  <text x="770" y="166" text-anchor="middle" font-size="10" fill="#4a41b0">Champion + challenger running</text>

  <!-- Cold start evolution -->
  <line x1="30" y1="258" x2="870" y2="258" stroke="#d0d0e0" stroke-width="1"/>
  <text x="46" y="278" font-size="10" fill="#666677" font-weight="500" letter-spacing="1">COLD START EVOLUTION — NEW OFFERS HAVE ZERO HISTORY</text>

  <!-- Phase 1 -->
  <rect x="30" y="290" width="256" height="200" rx="8" fill="#f0f0f8" stroke="#ccccdd" stroke-width="1"/>
  <text x="158" y="316" text-anchor="middle" font-size="11" font-weight="600" fill="#555566">Phase 1 — Random Baseline</text>
  <rect x="50" y="326" width="50" height="16" rx="3" fill="#d0d0dc"/>
  <text x="75" y="338" text-anchor="middle" font-size="9" fill="#888899">Before v1</text>
  <text x="158" y="366" text-anchor="middle" font-size="10" fill="#888899">10% of traffic</text>
  <text x="158" y="384" text-anchor="middle" font-size="10" fill="#888899">shown random offers</text>
  <text x="158" y="410" text-anchor="middle" font-size="10" fill="#555566">Why: you can't train a</text>
  <text x="158" y="428" text-anchor="middle" font-size="10" fill="#555566">model without unbiased</text>
  <text x="158" y="446" text-anchor="middle" font-size="10" fill="#555566">ground truth data</text>
  <text x="158" y="472" text-anchor="middle" font-size="9" fill="#666677">Breaks selection bias</text>

  <!-- Phase 2 -->
  <rect x="322" y="290" width="256" height="200" rx="8" fill="#f0f0f8" stroke="#185FA5" stroke-width="1"/>
  <text x="450" y="316" text-anchor="middle" font-size="11" font-weight="600" fill="#1a5a9a">Phase 2 — Epsilon-Greedy</text>
  <rect x="342" y="326" width="50" height="16" rx="3" fill="#185FA5" opacity="0.5"/>
  <text x="367" y="338" text-anchor="middle" font-size="9" fill="#1a5a9a">Model live</text>
  <text x="450" y="366" text-anchor="middle" font-size="10" fill="#1a5a9a">95% exploit model</text>
  <text x="450" y="384" text-anchor="middle" font-size="10" fill="#1a5a9a">5% explore randomly</text>
  <text x="450" y="410" text-anchor="middle" font-size="10" fill="#555566">Cold start resolves</text>
  <text x="450" y="428" text-anchor="middle" font-size="10" fill="#555566">over weeks — blunt</text>
  <text x="450" y="446" text-anchor="middle" font-size="10" fill="#555566">instrument, equal</text>
  <text x="450" y="464" text-anchor="middle" font-size="10" fill="#555566">exploration everywhere</text>
  <text x="450" y="480" text-anchor="middle" font-size="9" fill="#666677">Simple to reason about</text>

  <!-- Phase 3 -->
  <rect x="614" y="290" width="256" height="200" rx="8" fill="#f0f0f8" stroke="#3B6D11" stroke-width="1"/>
  <text x="742" y="316" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5a08">Phase 3 — Contextual Bandit</text>
  <rect x="634" y="326" width="80" height="16" rx="3" fill="#3B6D11" opacity="0.7"/>
  <text x="674" y="338" text-anchor="middle" font-size="9" fill="#2a5a08">RL policy</text>
  <text x="742" y="366" text-anchor="middle" font-size="10" fill="#2a5a08">Explore by uncertainty</text>
  <text x="742" y="384" text-anchor="middle" font-size="10" fill="#2a5a08">not by random chance</text>
  <text x="742" y="410" text-anchor="middle" font-size="10" fill="#555566">Cold start resolves</text>
  <text x="742" y="428" text-anchor="middle" font-size="10" fill="#555566">in days not weeks</text>
  <text x="742" y="446" text-anchor="middle" font-size="10" fill="#555566">Concentrates budget</text>
  <text x="742" y="464" text-anchor="middle" font-size="10" fill="#555566">where info gain is</text>
  <text x="742" y="480" text-anchor="middle" font-size="10" fill="#555566">highest</text>

  <!-- Phase arrows -->
  <line x1="286" y1="390" x2="322" y2="390" stroke="#999999" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="578" y1="390" x2="614" y2="390" stroke="#999999" stroke-width="1.5" marker-end="url(#arr2)"/>

  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999999" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
</svg>
