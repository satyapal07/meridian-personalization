  <rect x="30" y="366" width="390" height="52" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="54" y="388" font-size="11" fill="#7c3aed">#5</text>
  <text x="78" y="388" font-size="13" font-weight="600" fill="#6d28d9">Meridian Visa</text>
  <text x="78" y="406" font-size="10" fill="#7c3aed">CTR 0.38 · LTV 4.0×  →  score 0.38</text>
  <rect x="290" y="381" width="110" height="8" rx="4" fill="#ddd6fe"/>
  <rect x="290" y="381" width="42" height="8" rx="4" fill="#8b5cf6"/>

  <!-- Rank 6: Referral -->
  <rect x="30" y="428" width="390" height="52" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="54" y="450" font-size="11" fill="#9ca3af">#6</text>
  <text x="78" y="450" font-size="13" font-weight="400" fill="#6b7280">Visa Referral</text>
  <text x="78" y="468" font-size="10" fill="#9ca3af">CTR 0.31 · LTV 3.5×  →  score 0.31</text>
  <rect x="290" y="443" width="110" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="290" y="443" width="34" height="8" rx="4" fill="#d1d5db"/>

  <!-- ── RIGHT SIDE ── -->

  <!-- Rank 1: Meridian Visa (highlighted — was #5) -->
  <rect x="480" y="118" width="390" height="52" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="504" y="140" font-size="11" font-weight="700" fill="#7c3aed">#1</text>
  <text x="528" y="140" font-size="13" font-weight="700" fill="#5b21b6">Meridian Visa</text>
  <text x="528" y="158" font-size="10" fill="#6d28d9">CTR 0.38 · LTV 4.0×  →  score 1.52</text>
  <rect x="740" y="133" width="110" height="8" rx="4" fill="#ddd6fe"/>
  <rect x="740" y="133" width="110" height="8" rx="4" fill="#7c3aed"/>

  <!-- Rank 2: Referral -->
  <rect x="480" y="180" width="390" height="52" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="504" y="202" font-size="11" fill="#7c3aed">#2</text>
  <text x="528" y="202" font-size="13" font-weight="500" fill="#374151">Visa Referral</text>
  <text x="528" y="220" font-size="10" fill="#9ca3af">CTR 0.31 · LTV 3.5×  →  score 1.09</text>
  <rect x="740" y="195" width="110" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="740" y="195" width="79" height="8" rx="4" fill="#a78bfa"/>

  <!-- Rank 3: BNPL -->
  <rect x="480" y="242" width="390" height="52" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="504" y="264" font-size="11" fill="#6b7280">#3</text>
  <text x="528" y="264" font-size="13" font-weight="500" fill="#374151">Split Pay (BNPL)</text>
  <text x="528" y="282" font-size="10" fill="#9ca3af">CTR 0.55 · LTV 1.8×  →  score 0.99</text>
  <rect x="740" y="257" width="110" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="740" y="257" width="71" height="8" rx="4" fill="#93c5fd"/>

  <!-- Rank 4: Pay with Card -->
  <rect x="480" y="304" width="390" height="52" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="504" y="326" font-size="11" fill="#9ca3af">#4</text>
  <text x="528" y="326" font-size="13" font-weight="500" fill="#374151">Pay with Card</text>
  <text x="528" y="344" font-size="10" fill="#9ca3af">CTR 0.61 · LTV 1.2×  →  score 0.73</text>
  <rect x="740" y="319" width="110" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="740" y="319" width="53" height="8" rx="4" fill="#d1d5db"/>

  <!-- Rank 5: Gift Card (highlighted — was #1) -->
  <rect x="480" y="366" width="390" height="52" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="504" y="388" font-size="11" fill="#ea580c">#5</text>
  <text x="528" y="388" font-size="13" font-weight="600" fill="#c2410c">Gift Card</text>
  <text x="528" y="406" font-size="10" fill="#9a3412">CTR 0.82 · LTV 1.0×  →  score 0.82</text>
  <rect x="740" y="381" width="110" height="8" rx="4" fill="#fed7aa"/>
  <rect x="740" y="381" width="59" height="8" rx="4" fill="#fb923c"/>

  <!-- Rank 6: Points -->
  <rect x="480" y="428" width="390" height="52" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="504" y="450" font-size="11" fill="#9ca3af">#6</text>
  <text x="528" y="450" font-size="13" font-weight="400" fill="#6b7280">Shop with Points</text>
  <text x="528" y="468" font-size="10" fill="#9ca3af">CTR 0.78 · LTV 0.8×  →  score 0.62</text>
  <rect x="740" y="443" width="110" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="740" y="443" width="45" height="8" rx="4" fill="#d1d5db"/>

  <!-- ── SWAP ARROWS ── -->
  <defs>
    <marker id="arr-up" viewBox="0 0 10 10" refX="5" refY="2" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 8 L5 1 L10 8" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-down" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 2 L5 9 L10 2" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Visa: #5 → #1 (rises) -->
  <path d="M 420 392 Q 450 260 480 144" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr-up)"/>
  <rect x="428" y="256" width="44" height="18" rx="4" fill="#7c3aed"/>
  <text x="450" y="269" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">+4 ↑</text>

  <!-- Gift Card: #1 → #5 (drops) -->
  <path d="M 420 144 Q 450 276 480 392" fill="none" stroke="#f97316" stroke-width="2" marker-end="url(#arr-down)"/>
  <rect x="428" y="296" width="44" height="18" rx="4" fill="#f97316"/>
  <text x="450" y="309" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">−4 ↓</text>
</svg>
