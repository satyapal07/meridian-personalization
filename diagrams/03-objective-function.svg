<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Helvetica, sans-serif">
  <rect width="900" height="520" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">Objective Function: CTR vs CTR × LTV</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#6b7280">Same 6 offers — completely different rankings</text>

  <!-- Divider -->
  <line x1="450" y1="70" x2="450" y2="508" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- Left header -->
  <rect x="30" y="70" width="390" height="38" rx="6" fill="#fef2f2"/>
  <text x="225" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">CTR Only  —  original objective</text>
  <text x="225" y="102" text-anchor="middle" font-size="10" fill="#ef4444">score = click-through rate</text>

  <!-- Right header -->
  <rect x="480" y="70" width="390" height="38" rx="6" fill="#f0fdf4"/>
  <text x="675" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">CTR × LTV  —  new objective</text>
  <text x="675" y="102" text-anchor="middle" font-size="10" fill="#16a34a">score = click rate × lifetime value</text>

  <!-- ── LEFT SIDE ── -->

  <!-- Rank 1: Gift Card (highlighted — drops to #5) -->
  <rect x="30" y="118" width="390" height="52" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="54" y="140" font-size="11" font-weight="700" fill="#ea580c">#1</text>
  <text x="78" y="140" font-size="13" font-weight="700" fill="#c2410c">Gift Card</text>
  <text x="78" y="158" font-size="10" fill="#9a3412">CTR 0.82 · LTV 1.0×  →  score 0.82</text>
  <rect x="290" y="133" width="110" height="8" rx="4" fill="#fed7aa"/>
  <rect x="290" y="133" width="90" height="8" rx="4" fill="#f97316"/>

  <!-- Rank 2: Points -->
  <rect x="30" y="180" width="390" height="52" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="54" y="202" font-size="11" fill="#9ca3af">#2</text>
  <text x="78" y="202" font-size="13" font-weight="500" fill="#374151">Shop with Points</text>
  <text x="78" y="220" font-size="10" fill="#9ca3af">CTR 0.78 · LTV 0.8×  →  score 0.78</text>
  <rect x="290" y="195" width="110" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="290" y="195" width="86" height="8" rx="4" fill="#d1d5db"/>

  <!-- Rank 3: Pay with Card -->
  <rect x="30" y="242" width="390" height="52" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="54" y="264" font-size="11" fill="#9ca3af">#3</text>
  <text x="78" y="264" font-size="13" font-weight="500" fill="#374151">Pay with Card</text>
  <text x="78" y="282" font-size="10" fill="#9ca3af">CTR 0.61 · LTV 1.2×  →  score 0.61</text>
  <rect x="290" y="257" width="110" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="290" y="257" width="67" height="8" rx="4" fill="#d1d5db"/>

  <!-- Rank 4: BNPL -->
  <rect x="30" y="304" width="390" height="52" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="54" y="326" font-size="11" fill="#9ca3af">#4</text>
  <text x="78" y="326" font-size="13" font-weight="500" fill="#374151">Split Pay (BNPL)</text>
  <text x="78" y="344" font-size="10" fill="#9ca3af">CTR 0.55 · LTV 1.8×  →  score 0.55</text>
  <rect x="290" y="319" width="110" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="290" y="319" width="60" height="8" rx="4" fill="#d1d5db"/>

